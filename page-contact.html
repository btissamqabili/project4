<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZayFBS - Contacter Nous</title>
    <link rel="stylesheet" href="page contact.css">
</head>
<body>

    <header>
    <nav>
    <div>
   <strong>ZayFBS</strong>
    <img src="imagebreif4/logo-navbar.jpg" alt="Logo ZayFBS">
 </div>
    <ul>
    <li><a href="page-acceuil.html">Acceuil</a></li>
    <li><a href="page-produits.html">Produits</a></li>
    <li><a href="page-contact.html">Contact</a></li>
    </ul>

    <div class="panier">
    <img src="imagebreif4/logo-panier.png" alt="Panier d'achat">
    </div>
    </nav>
    </header>

    <main class="main-content">
        <h1 class="page-title">Contacter Nous</h1>

        <form class="contact-form" id="contactForm">
            <div class="form-group">
                <label class="label-with-icon">
                    <span class="olive-icon"></span>
                    <span>Nom</span>
                </label>
                <input type="text" class="form-input" placeholder="Votre nom..." required>
            </div>

            <div class="form-group">
                <label class="label-with-icon">
                    <span class="olive-icon"></span>
                    <span>Email</span>
                </label>
                <input type="email" class="form-input" placeholder="Votre email..." required>
            </div>

            <div class="form-group">
                <label class="label-with-icon">
                    <span class="olive-icon"></span>
                    <span>Message</span>
                </label>
                <textarea class="form-input" placeholder="Votre message..." required></textarea>
            </div>

            <div class="buttons-row">
                <button type="submit" class="btn btn-envoyer">Envoyer</button>
                <button type="reset" class="btn btn-reset">Réinitialiser</button>
            </div>
        </form>
    </main>
    <div class="divider"></div>
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <div class="footer-title"><span class="icon-pin"></span> Région</div>
                <div class="footer-text">Fquih Ben Salah, Maroc</div>
            </div>

            <div class="footer-section">
                <div class="footer-title"><span class="icon-phone"></span> Contact</div>
                <div class="footer-text">
                    +212 5 00 00 00 00<br>
                    contact@zayfbs.ma
                </div>
            </div>

            <div class="footer-section">
                <div class="footer-title"><span class="icon-link"></span> Liens utiles</div>
                <ul class="footer-links">
                    <li><a href="#">Accueil</a></li>
                    <li><a href="#">Produits</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
        </div>

        <div class="footer-bottom">
            © 2026 ZayFBS-Tous droits réservés
        </div>
    </footer>

    <script src="page-contact.js"></script>
</body>
</html>
